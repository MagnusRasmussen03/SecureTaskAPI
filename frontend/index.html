<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureTaskAPI</title>
    <!-- CSS i sin egen fil -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- BEKRÆFTELSESDIALOG -->
<div id="confirmOverlay" class="overlay">
    <div class="dialog">
        <h3 id="dialogTitle">⚠️ Bekræft handling</h3>
        <p id="dialogText">Er du sikker?</p>
        <div class="dialog-buttons">
            <button class="btn-secondary" onclick="cancelAction()">Annuller</button>
            <button class="btn-danger" onclick="executeAction()">Bekræft</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>🛡️ SecureTaskAPI</h1>

    <!-- AUTH SEKTION -->
    <div id="authSection" class="card">
        <div class="tabs">
            <button class="tab active" onclick="showTab('login', event)">Log ind</button>
            <button class="tab" onclick="showTab('register', event)">Opret bruger</button>
        </div>
        <div id="authMessage" class="message"></div>
        <input type="text" id="username" placeholder="Brugernavn" />
        <input type="password" id="password" placeholder="Password" />
        <button id="loginBtn" class="btn-primary" onclick="login()">Log ind</button>
        <button id="registerBtn" class="btn-primary hidden" onclick="register()">Opret bruger</button>
    </div>

    <!-- TASK SEKTION -->
    <div id="taskSection" class="hidden">
        <div class="header">
            <h2>Dine opgaver</h2>
            <button class="logout-btn" onclick="logout()">Log ud</button>
        </div>
        <div class="stats-banner">
            <div class="stat-item">
                <span class="stat-number" id="statTotal">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="statCompleted" style="color:#16a34a">0</span>
                <span class="stat-label">Færdige</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="statPending" style="color:#f59e0b">0</span>
                <span class="stat-label">Tilbage</span>
            </div>
        </div>
        <div class="card">
            <input type="text" id="newTaskTitle" placeholder="Ny opgave..." />
            <button class="btn-primary" id="addTaskBtn" onclick="createTask()">Tilføj opgave</button>
        </div>
        <div id="taskMessage" class="message"></div>
        <div id="taskList"></div>
    </div>

    <!-- ADMIN SEKTION -->
    <div id="adminSection" class="hidden">
        <div class="header">
            <h2>Admin Panel <span class="admin-badge">admin</span></h2>
            <button class="logout-btn" onclick="logout()">Log ud</button>
        </div>
        <div id="adminMessage" class="message"></div>
        <div id="adminUserList"></div>
        <div id="adminUserDetail" class="hidden">
            <div class="user-detail">
                <div class="user-detail-header">
                    <h3 id="detailUsername"></h3>
                    <button class="back-btn" onclick="showUserList()">← Tilbage</button>
                </div>
                <div id="detailTaskList"></div>
            </div>
        </div>
    </div>
</div>

<!-- JavaScript filer i rækkefølge! -->
<!-- api.js skal være FØRST da de andre bruger apiFetch -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/tasks.js"></script>
<script src="js/admin.js"></script>
</body>
</html>

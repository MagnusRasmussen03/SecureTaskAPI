<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureTaskAPI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 2rem;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #7c3aed;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #7c3aed;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 0.5rem;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover { opacity: 0.85; }
        button:active { transform: scale(0.98); }

        .btn-primary { background: #7c3aed; color: white; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-danger { background: #dc2626; color: white; width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; margin-bottom: 0; }
        .btn-success { background: #16a34a; color: white; width: auto; padding: 0.4rem 0.8rem; font-size: 0.85rem; margin-bottom: 0; }

        /* ─────────────────────────────────────────
           STATISTIK BANNER
        ───────────────────────────────────────── */
        .stats-banner {
            display: flex;
            justify-content: space-around;
            background: #1e293b;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-number {
            font-size: 1.75rem;
            font-weight: bold;
            color: #7c3aed;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ─────────────────────────────────────────
           LOADING SPINNER
        ───────────────────────────────────────── */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ─────────────────────────────────────────
           BEKRÆFTELSESDIALOG
        ───────────────────────────────────────── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .dialog {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            max-width: 350px;
            width: 90%;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.2s;
        }

        .overlay.visible .dialog {
            transform: scale(1);
        }

        .dialog h3 {
            margin-bottom: 0.75rem;
            color: #e2e8f0;
        }

        .dialog p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }

        .dialog-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .dialog-buttons button {
            margin-bottom: 0;
        }

        /* ─────────────────────────────────────────
           OPGAVE LISTE
        ───────────────────────────────────────── */
        .task-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 0.75rem;
            border-left: 3px solid #7c3aed;
            transition: opacity 0.3s, transform 0.3s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .task-item.completed {
            border-left-color: #16a34a;
            opacity: 0.6;
        }

        .task-title { font-size: 1rem; }
        .task-title.completed { text-decoration: line-through; }

        .task-buttons {
            display: flex;
            gap: 0.5rem;
        }

        /* ─────────────────────────────────────────
           BESKEDER
        ───────────────────────────────────────── */
        .message {
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }

        .message.error   { background: #7f1d1d; color: #fca5a5; display: block; }
        .message.success { background: #14532d; color: #86efac; display: block; }

        /* ─────────────────────────────────────────
           TABS
        ───────────────────────────────────────── */
        .tabs {
            display: flex;
            margin-bottom: 1.5rem;
            gap: 0.5rem;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #334155;
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 0;
            transition: background 0.2s, color 0.2s;
        }

        .tab.active { background: #7c3aed; color: white; }

        /* ─────────────────────────────────────────
           HEADER
        ───────────────────────────────────────── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .header h2 { color: #7c3aed; }

        .logout-btn {
            width: auto;
            padding: 0.5rem 1rem;
            background: #334155;
            color: #e2e8f0;
            margin-bottom: 0;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<!-- ─────────────────────────────────────────
     BEKRÆFTELSESDIALOG
───────────────────────────────────────── -->
<div id="confirmOverlay" class="overlay">
    <div class="dialog">
        <h3>⚠️ Slet opgave</h3>
        <p>Er du sikker på at du vil slette denne opgave? Det kan ikke fortrydes.</p>
        <div class="dialog-buttons">
            <button class="btn-secondary" onclick="cancelDelete()">Annuller</button>
            <button class="btn-danger" onclick="confirmDelete()">Slet</button>
        </div>
    </div>
</div>

<div class="container">
    <h1>🛡️ SecureTaskAPI</h1>

    <!-- AUTH SEKTION -->
    <div id="authSection" class="card">
        <div class="tabs">
            <button class="tab active" onclick="showTab('login', event)">Log ind</button>
            <button class="tab" onclick="showTab('register', event)">Opret bruger</button>
        </div>

        <div id="authMessage" class="message"></div>

        <input type="text" id="username" placeholder="Brugernavn" />
        <input type="password" id="password" placeholder="Password" />

        <button id="loginBtn" class="btn-primary" onclick="login()">Log ind</button>
        <button id="registerBtn" class="btn-primary hidden" onclick="register()">Opret bruger</button>
    </div>

    <!-- TASK SEKTION -->
    <div id="taskSection" class="hidden">
        <div class="header">
            <h2>Dine opgaver</h2>
            <button class="logout-btn" onclick="logout()">Log ud</button>
        </div>

        <!-- STATISTIK BANNER -->
        <div class="stats-banner">
            <div class="stat-item">
                <span class="stat-number" id="statTotal">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="statCompleted" style="color:#16a34a">0</span>
                <span class="stat-label">Færdige</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="statPending" style="color:#f59e0b">0</span>
                <span class="stat-label">Tilbage</span>
            </div>
        </div>

        <!-- OPRET OPGAVE -->
        <div class="card">
            <input type="text" id="newTaskTitle" placeholder="Ny opgave..." />
            <button class="btn-primary" id="addTaskBtn" onclick="createTask()">Tilføj opgave</button>
        </div>

        <div id="taskMessage" class="message"></div>
        <div id="taskList"></div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:5274';
    let token = null;
    let deleteTaskId = null; // Gemmer id på opgaven der skal slettes

    // ─────────────────────────────────────────
    // TAB SKIFT
    // ─────────────────────────────────────────
    function showTab(tab, event) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');

        if (tab === 'login') {
            document.getElementById('loginBtn').classList.remove('hidden');
            document.getElementById('registerBtn').classList.add('hidden');
        } else {
            document.getElementById('loginBtn').classList.add('hidden');
            document.getElementById('registerBtn').classList.remove('hidden');
        }
        clearMessage('authMessage');
    }

    // ─────────────────────────────────────────
    // HJÆLPEFUNKTIONER
    // ─────────────────────────────────────────
    function showMessage(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className = `message ${type}`;
    }

    function clearMessage(id) {
        document.getElementById(id).className = 'message';
    }

    // Vis loading spinner på en knap
    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        btn.disabled = loading;
        btn.innerHTML = loading
            ? `<span class="spinner"></span> Vent...`
            : btn.dataset.label;
    }

    async function apiFetch(endpoint, method = 'GET', body = null) {
        const headers = { 'Content-Type': 'application/json' };
        if (token) headers['Authorization'] = `Bearer ${token}`;

        const response = await fetch(`${API_URL}${endpoint}`, {
            method,
            headers,
            body: body ? JSON.stringify(body) : null
        });

        return response;
    }

    // Opdater statistik banner
    function updateStats(tasks) {
        const total = tasks.length;
        const completed = tasks.filter(t => t.isCompleted).length;
        const pending = total - completed;

        document.getElementById('statTotal').textContent = total;
        document.getElementById('statCompleted').textContent = completed;
        document.getElementById('statPending').textContent = pending;
    }

    // ─────────────────────────────────────────
    // AUTH FUNKTIONER
    // ─────────────────────────────────────────
    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const btn = document.getElementById('loginBtn');
        btn.dataset.label = 'Log ind';
        setLoading('loginBtn', true);

        try {
            const response = await apiFetch('/auth/login', 'POST', { username, password });

            if (response.ok) {
                const data = await response.json();
                token = data.token;
                showTaskSection();
            } else {
                showMessage('authMessage', 'Forkert brugernavn eller password!', 'error');
            }
        } catch {
            showMessage('authMessage', 'Kunne ikke forbinde til API!', 'error');
        } finally {
            setLoading('loginBtn', false);
            btn.innerHTML = 'Log ind';
        }
    }

    async function register() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const btn = document.getElementById('registerBtn');
        btn.dataset.label = 'Opret bruger';
        setLoading('registerBtn', true);

        try {
            const response = await apiFetch('/auth/register', 'POST', { username, password });

            if (response.ok) {
                showMessage('authMessage', 'Bruger oprettet! Log ind nu.', 'success');
            } else {
                const text = await response.text();
                showMessage('authMessage', text, 'error');
            }
        } catch {
            showMessage('authMessage', 'Kunne ikke forbinde til API!', 'error');
        } finally {
            setLoading('registerBtn', false);
            btn.innerHTML = 'Opret bruger';
        }
    }

    function logout() {
        token = null;
        document.getElementById('authSection').classList.remove('hidden');
        document.getElementById('taskSection').classList.add('hidden');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
    }

    function showTaskSection() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('taskSection').classList.remove('hidden');
        loadTasks();
    }

    // ─────────────────────────────────────────
    // TASK FUNKTIONER
    // ─────────────────────────────────────────
    async function loadTasks() {
        try {
            const response = await apiFetch('/tasks');
            const tasks = await response.json();
            renderTasks(tasks);
            updateStats(tasks); // Opdater statistik!
        } catch {
            showMessage('taskMessage', 'Kunne ikke hente opgaver!', 'error');
        }
    }

    function renderTasks(tasks) {
        const list = document.getElementById('taskList');

        if (tasks.length === 0) {
            list.innerHTML = '<p style="text-align:center;color:#64748b;padding:1rem">Ingen opgaver endnu — tilføj en ovenfor!</p>';
            return;
        }

        list.innerHTML = tasks.map(task => `
            <div class="task-item ${task.isCompleted ? 'completed' : ''}">
                <span class="task-title ${task.isCompleted ? 'completed' : ''}">${task.title}</span>
                <div class="task-buttons">
                    <button class="btn-success" onclick="toggleTask(${task.id}, ${task.isCompleted})">
                        ${task.isCompleted ? '↩' : '✓'}
                    </button>
                    <button class="btn-danger" onclick="askDelete(${task.id})">🗑</button>
                </div>
            </div>
        `).join('');
    }

    async function createTask() {
        const title = document.getElementById('newTaskTitle').value.trim();

        if (!title) {
            showMessage('taskMessage', 'Skriv en titel først!', 'error');
            return;
        }

        const btn = document.getElementById('addTaskBtn');
        btn.dataset.label = 'Tilføj opgave';
        setLoading('addTaskBtn', true);

        try {
            const response = await apiFetch('/tasks', 'POST', { title });

            if (response.ok) {
                document.getElementById('newTaskTitle').value = '';
                clearMessage('taskMessage');
                loadTasks();
            }
        } catch {
            showMessage('taskMessage', 'Kunne ikke oprette opgave!', 'error');
        } finally {
            setLoading('addTaskBtn', false);
            btn.innerHTML = 'Tilføj opgave';
        }
    }

    async function toggleTask(id, isCompleted) {
        try {
            const response = await apiFetch(`/tasks/${id}`);
            const task = await response.json();

            await apiFetch(`/tasks/${id}`, 'PUT', {
                title: task.title,
                isCompleted: !isCompleted
            });

            loadTasks();
        } catch {
            showMessage('taskMessage', 'Kunne ikke opdatere opgave!', 'error');
        }
    }

    // ─────────────────────────────────────────
    // BEKRÆFTELSESDIALOG
    // ─────────────────────────────────────────
    function askDelete(id) {
        deleteTaskId = id; // Gem id til senere
        document.getElementById('confirmOverlay').classList.add('visible');
    }

    function cancelDelete() {
        deleteTaskId = null;
        document.getElementById('confirmOverlay').classList.remove('visible');
    }

    async function confirmDelete() {
        if (!deleteTaskId) return;

        document.getElementById('confirmOverlay').classList.remove('visible');

        try {
            await apiFetch(`/tasks/${deleteTaskId}`, 'DELETE');
            loadTasks();
        } catch {
            showMessage('taskMessage', 'Kunne ikke slette opgave!', 'error');
        } finally {
            deleteTaskId = null;
        }
    }

    // Enter-tast til at oprette opgave
    document.getElementById('newTaskTitle')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') createTask();
    });
</script>
</body>
</html>
